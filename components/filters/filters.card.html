<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><title>filters</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:16px;background:#fff}</style></head><body><div id="root"></div>
<script type="text/babel">
const NS=window.ToNCUADVDesignSystem_ce468e;
const {FilterBar,FilterChip,Select}=NS;
function Card(){const [ind,setInd]=React.useState('F&B');
return <div style={{display:'grid',gap:12}}>
  <FilterBar resultCount={128} onClear={()=>setInd(null)}>
    <Select placeholder="Tỉnh/thành" options={['Hà Nội','TP.HCM','Đà Nẵng']} style={{width:140,height:36}}/>
    <Select placeholder="Loại biển" options={['Billboard','Sân bay','LED']} style={{width:130,height:36}}/>
    <FilterChip active onRemove={()=>{}}>Còn trống</FilterChip>
  </FilterBar>
  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
    {['F&B','Thời trang','Mỹ phẩm','Gia dụng','Công nghệ'].map(x=>
      <FilterChip key={x} active={ind===x} onClick={()=>setInd(x)}>{x}</FilterChip>)}
  </div>
</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<Card/>);
</script></body></html>
