<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><title>forms</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:16px;background:#fff}</style></head><body><div id="root"></div>
<script type="text/babel">
const NS=window.ToNCUADVDesignSystem_ce468e;
const {Field,Input,Select,Textarea,Checkbox,Button}=NS;
function Card(){const [ok,setOk]=React.useState(true);
return <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,maxWidth:660}}>
  <Field label="Họ tên" required><Input placeholder="Nguyễn Văn A"/></Field>
  <Field label="Số điện thoại" required error="Vui lòng nhập số điện thoại hợp lệ"><Input defaultValue="09xx" error="1"/></Field>
  <Field label="Ngành hàng"><Select placeholder="Chọn ngành hàng" options={['F&B','Thời trang & Phụ kiện','Mỹ phẩm & Chăm sóc cá nhân','Đồ gia dụng & Trang trí','Công nghệ & Điện tử']}/></Field>
  <Field label="Ngân sách"><Select placeholder="Chọn khoảng ngân sách" options={['< 50 triệu/tháng','50-150 triệu/tháng','> 150 triệu/tháng']}/></Field>
  <div style={{gridColumn:'1/-1'}}><Field label="Nhu cầu / ghi chú"><Textarea rows={2} placeholder="Mô tả ngắn nhu cầu quảng cáo của bạn…"/></Field></div>
  <Checkbox label="Đồng ý nhận liên hệ" checked={ok} onChange={setOk}/>
  <div style={{justifySelf:'end'}}><Button variant="cta">Gửi yêu cầu tư vấn</Button></div>
</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<Card/>);
</script></body></html>
