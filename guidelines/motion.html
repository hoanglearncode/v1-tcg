<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans)}.lbl{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}</style></head><body><div style="display:flex;gap:14px"><div class="mo" style="flex:1;border:1px solid var(--border);border-radius:10px;padding:14px"><div style="height:8px;background:var(--muted);border-radius:4px;overflow:hidden"><div class="bar" style="width:30%;height:100%;background:var(--primary);border-radius:4px;transition:width var(--dur-fast) var(--ease-standard)"></div></div><div style="font-size:13px;font-weight:600;margin-top:8px">150ms</div><div class="lbl">hover, micro</div></div><div class="mo" style="flex:1;border:1px solid var(--border);border-radius:10px;padding:14px"><div style="height:8px;background:var(--muted);border-radius:4px;overflow:hidden"><div class="bar" style="width:30%;height:100%;background:var(--primary);border-radius:4px;transition:width var(--dur-base) var(--ease-standard)"></div></div><div style="font-size:13px;font-weight:600;margin-top:8px">250ms</div><div class="lbl">enter / exit</div></div><div class="mo" style="flex:1;border:1px solid var(--border);border-radius:10px;padding:14px"><div style="height:8px;background:var(--muted);border-radius:4px;overflow:hidden"><div class="bar" style="width:30%;height:100%;background:var(--primary);border-radius:4px;transition:width var(--dur-slow) var(--ease-standard)"></div></div><div style="font-size:13px;font-weight:600;margin-top:8px">400ms</div><div class="lbl">overlay, section</div></div></div><p style="font-size:12px;color:var(--muted-foreground);margin:12px 0 0">Chuyển động chỉ để xác nhận thao tác, không parallax, không scroll-jacking. Di chuột để thử.</p>
 <style>.mo:hover .bar{width:100%}</style></body></html>
