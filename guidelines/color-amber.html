<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans)}.lbl{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}</style></head><body><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
 <button style="height:44px;padding:0 20px;border:none;border-radius:var(--radius-md);background:var(--cta);color:var(--cta-foreground);font-weight:600;font-family:inherit;font-size:1rem">Yêu cầu báo giá</button>
 <button style="height:44px;padding:0 20px;border:none;border-radius:var(--radius-md);background:var(--primary);color:#fff;font-weight:600;font-family:inherit;font-size:1rem">Xem chi tiết</button>
 <button style="height:44px;padding:0 20px;border:1px solid var(--border);border-radius:var(--radius-md);background:#fff;color:var(--primary);font-weight:600;font-family:inherit;font-size:1rem">Xóa lọc</button>
 <span style="font-size:12px;color:var(--muted-foreground);max-width:230px">CTA vàng của v1/v2 đã loại bỏ theo yêu cầu brand. --cta = blue-600 #2374D9, chữ trắng.</span></div></body></html>
