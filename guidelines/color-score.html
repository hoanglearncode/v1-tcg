<!-- @dsCard group="Colors" viewport="700x140" name="AI score scale" subtitle="Sequential 0–100, riêng khỏi màu brand, luôn kèm số + nhãn" -->
<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans)}.lbl{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}</style></head><body><div style="display:flex;gap:10px"><div style="flex:1;border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--score-low);height:40px;display:grid;place-items:center;color:#fff;font-family:var(--font-mono);font-weight:700">0–39</div><div style="padding:6px 8px;font-size:12px;font-weight:600">Thấp <span class="lbl">--score-low</span></div></div><div style="flex:1;border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--score-mid);height:40px;display:grid;place-items:center;color:#fff;font-family:var(--font-mono);font-weight:700">40–59</div><div style="padding:6px 8px;font-size:12px;font-weight:600">Trung bình <span class="lbl">--score-mid</span></div></div><div style="flex:1;border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--score-good);height:40px;display:grid;place-items:center;color:#fff;font-family:var(--font-mono);font-weight:700">60–79</div><div style="padding:6px 8px;font-size:12px;font-weight:600">Khá <span class="lbl">--score-good</span></div></div><div style="flex:1;border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--score-high);height:40px;display:grid;place-items:center;color:#fff;font-family:var(--font-mono);font-weight:700">80–100</div><div style="padding:6px 8px;font-size:12px;font-weight:600">Cao <span class="lbl">--score-high</span></div></div></div></body></html>
