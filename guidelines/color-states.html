<!-- @dsCard group="Colors" viewport="700x130" name="State colors" subtitle="success · warning · destructive · info — tách khỏi brand accent" -->
<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans)}.lbl{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}</style></head><body><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--success);height:48px"></div><div style="padding:6px 8px"><div style="font-size:12px;font-weight:600">Thành công / còn trống</div><div class="lbl">--success</div></div></div><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--warning);height:48px"></div><div style="padding:6px 8px"><div style="font-size:12px;font-weight:600">Cảnh báo / sắp hết</div><div class="lbl">--warning</div></div></div><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--destructive);height:48px"></div><div style="padding:6px 8px"><div style="font-size:12px;font-weight:600">Lỗi / xóa</div><div class="lbl">--destructive</div></div></div><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden"><div style="background:var(--info);height:48px"></div><div style="padding:6px 8px"><div style="font-size:12px;font-weight:600">Thông tin</div><div class="lbl">--info</div></div></div></div></body></html>
