<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:16px;font-family:var(--font-sans)}.lbl{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}</style></head><body><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"><div style="background:var(--primary);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#fff">--primary</span></div><div style="background:var(--cta);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#0F172A">--cta</span></div><div style="background:var(--secondary);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#12315E">--secondary</span></div><div style="background:var(--muted);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#64748B">--muted</span></div><div style="background:var(--foreground);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#fff">--foreground</span></div><div style="background:var(--muted-foreground);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#fff">--muted-fg</span></div><div style="background:var(--border);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#0F172A">--border</span></div><div style="background:var(--ring);border:1px solid var(--border);border-radius:8px;height:56px;display:flex;align-items:flex-end;padding:6px 8px"><span style="font-size:10px;font-family:var(--font-mono);color:#fff">--ring</span></div></div></body></html>
