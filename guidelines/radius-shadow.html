<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:24px;font-family:var(--font-sans)}.lbl{font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono)}</style></head><body><div style="display:flex;gap:16px;align-items:center"><div style="width:110px;height:96px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);display:grid;place-items:center;text-align:center"><div><div style="font-size:12px;font-weight:600">sm 1px</div><div class="lbl">input</div></div></div><div style="width:110px;height:96px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);display:grid;place-items:center;text-align:center"><div><div style="font-size:12px;font-weight:600">md 2px</div><div class="lbl">button</div></div></div><div style="width:110px;height:96px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);display:grid;place-items:center;text-align:center"><div><div style="font-size:12px;font-weight:600">lg 2px</div><div class="lbl">card hover</div></div></div><div style="width:110px;height:96px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);display:grid;place-items:center;text-align:center"><div><div style="font-size:12px;font-weight:600">xl 4px</div><div class="lbl">popover</div></div></div><div style="width:110px;height:96px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-2xl);box-shadow:var(--shadow-xl);display:grid;place-items:center;text-align:center"><div><div style="font-size:12px;font-weight:600">2xl 6px</div><div class="lbl">modal</div></div></div></div><p style="font-size:12px;color:var(--muted-foreground);margin:12px 0 0">Pill/badge dùng radius-full có chủ đích; mọi thứ khác sắc cạnh. Ưu tiên viền 1px thay bóng.</p></body></html>
